name: Build release
on:
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Move .env file
        run: mv .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-dev -o --prefer-dist --ignore-platform-reqs

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and run production scripts
        run: npm run build

      - name: Clear vendor
        run: |
          php vendor/bin/cleanup
          find vendor/nesbot/carbon/src/Carbon/Lang -maxdepth 1 -name '*.php' \
            ! -name 'en.php' ! -name 'ru.php' -delete

      - name: Create Archive
        run: >
          zip -r release.zip .
          -x '.git/*' -x '.github/*' -x 'node_modules/*' -x 'tests/*'
          -x 'package.json' -x 'package-lock.json' -x 'vite.config.js'
          -x 'pint.json' -x 'phpstan.neon' -x 'phpunit.xml' -x 'composer.lock'
          -x '.editorconfig' -x '.gitignore' -x '.gitattributes'
          -x 'deploy.php' -x 'docker-compose.yml' -x 'scripts/*'

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release.zip
          asset_name: rotor-release-$tag.zip
          tag: ${{ github.ref }}
